name: Deploys a NodeJS service in a remote server
author: sergiogc9
description: Deploys a NodeJS service in a remote server using the detected package manager
inputs:
  host:
    description: 'The server host'
    required: true
  port:
    description: 'The server port.'
    required: true
  username:
    description: 'Username for authentication.'
    required: true
  password:
    description: 'Password for user authentication.'
    required: true
  cwd:
    description: 'The working directory where the commands are executed'
    required: true
  package_manager:
    description: 'Package manager to use (yarn or pnpm). Auto-detected from lock files if not specified.'
    required: false
runs:
  using: 'node16'
  main: 'dist/index.js'
branding:
  color: 'green'
  icon: 'file-text'
